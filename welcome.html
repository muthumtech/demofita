<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Web Page</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>Welcome to My First Web Page</h1>

    <!-- Paragraph Text -->
    <p>This is a standard sample paragraph demonstrating how text is structured in HTML. You can add <strong>bold text</strong> or <em>emphasized text</em> easily.</p>

    <!-- Hyperlink -->
    <p>Learn more by visiting the <a href="https://developer.mozilla.org" target="_blank">MDN Web Docs</a>.</p>

    <!-- Image Placeholder -->
    <img src="https://placeholder.com" alt="Sample Placeholder Image">

    <!-- Unordered List -->
    <h3>My Favorite Fruits</h3>
    <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Oranges</li>
    </ul>

</body>
</html>
